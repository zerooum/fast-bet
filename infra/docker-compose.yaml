name: fastbet

# Trust boundary note (see docs/local-development.md):
# When the `identity` (and other business services) are dockerized in a
# future change, by default they should publish ports on `localhost` to
# keep `make smoke` ergonomic. For prod-like topologies, declare them with
# `profiles: ["gateway-only"]` on a `ports:`-less variant so
#   docker compose --profile gateway-only up
# omits the host publication and forces all traffic through the gateway.
# Identity already enforces the public-route protections (forbidden auth
# headers, per-IP rate limit, trusted-proxy XFF) regardless of the chosen
# topology.

networks:
  fastbet:
    driver: bridge

volumes:
  pgdata:
  kafka-data:
  redis-data:

services:
  postgres:
    image: postgres:16.6
    container_name: fastbet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?set POSTGRES_SUPERUSER_PASSWORD in .env}
      POSTGRES_DB: postgres
      # Service-role passwords consumed by 01-databases.sql
      IDENTITY_SVC_PASSWORD: ${IDENTITY_SVC_PASSWORD:?set IDENTITY_SVC_PASSWORD in .env}
      CATALOG_SVC_PASSWORD: ${CATALOG_SVC_PASSWORD:?set CATALOG_SVC_PASSWORD in .env}
      WALLET_SVC_PASSWORD:  ${WALLET_SVC_PASSWORD:?set WALLET_SVC_PASSWORD in .env}
      BETS_SVC_PASSWORD:    ${BETS_SVC_PASSWORD:?set BETS_SVC_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - fastbet

  # Kafka in KRaft mode (single broker, no Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: fastbet-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - fastbet

  redis:
    image: redis:7.4
    container_name: fastbet-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - fastbet
