# Fast-Bet Identity service configuration.
#
# Driven by environment variables in non-test profiles — no secrets are
# hardcoded. The %test profile uses Quarkus DevServices to spin up a
# disposable Postgres container (requires a Docker daemon on the test host).

quarkus.application.name=identity
quarkus.http.port=${IDENTITY_HTTP_PORT:8081}

# --- Datasource (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${IDENTITY_DB_USER:identity_svc}
%prod.quarkus.datasource.password=${IDENTITY_DB_PASSWORD:change-me-identity}
%prod.quarkus.datasource.jdbc.url=${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/identity}

%dev.quarkus.datasource.username=${IDENTITY_DB_USER:identity_svc}
%dev.quarkus.datasource.password=${IDENTITY_DB_PASSWORD:change-me-identity}
%dev.quarkus.datasource.jdbc.url=${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/identity}

# Tests rely on DevServices: Quarkus boots a Postgres 16 container automatically.
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:16.6
%test.quarkus.datasource.devservices.db-name=identity

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.schemas=public
quarkus.flyway.default-schema=public

# --- Jackson ---
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.write-dates-as-timestamps=false

# --- Kafka (reactive messaging) ---
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
%dev.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
%dev.kafka.auto.create.topics.enable=true

mp.messaging.outgoing.user-registered.connector=smallrye-kafka
mp.messaging.outgoing.user-registered.topic=identity.user-registered
mp.messaging.outgoing.user-registered.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.user-registered.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.user-registered.acks=all

# In tests, route the channel through the in-memory connector so we can
# observe events without spinning up Kafka.
%test.mp.messaging.outgoing.user-registered.connector=smallrye-in-memory
%test.quarkus.kafka.devservices.enabled=false

# --- Outbox relay ---
fastbet.identity.outbox.batch-size=50

# --- Internal edge-token authentication ---
# Shared secret the Gateway must present on every business API request.
# Must be set to a non-blank value at runtime; startup fails if absent.
# In %test the value is overridden to a fixed test secret so unit/IT tests
# do not require the env var.
fastbet.identity.edge-token=${IDENTITY_EDGE_TOKEN:}

# --- Public endpoint hardening (defense-in-depth against bypass) ---
# Comma-separated list of path prefixes considered public (no auth, no
# X-User-* allowed). Set to empty to disable the guard.
fastbet.identity.public-paths=/signup
# Headers that MUST NOT appear on requests to public paths. Names are
# matched case-insensitively; the canonical form here is echoed in the
# rejection body.
fastbet.identity.public-paths.forbidden-headers=Authorization,X-User-Id,X-User-Roles
# Per-IP fixed-window rate limit on /signup. Mirrors the gateway's limit so
# direct callers cannot evade it. Set requests=0 to disable the limiter.
fastbet.identity.signup.rate-limit.requests=5
fastbet.identity.signup.rate-limit.window-seconds=60
# CIDR allow-list of upstream proxies whose X-Forwarded-For header should be
# trusted for client-IP resolution. Empty (default) = trust no proxy.
fastbet.identity.trusted-proxies=

# --- Redis (rate-limit state) ---
%prod.quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
%dev.quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# Tests: spin up a Redis devservice so @QuarkusTest does not need the
# compose stack running. Leaving quarkus.redis.hosts unset in %test lets
# the devservice supply it.
%test.quarkus.redis.devservices.enabled=true
%test.quarkus.redis.devservices.image-name=redis:7.4

# In tests, trust the loopback peer so we can drive client-IP resolution
# from X-Forwarded-For deterministically.
%test.fastbet.identity.trusted-proxies=127.0.0.0/8,::1/128
# Default test-profile rate limit is high so existing functional tests
# (which share the loopback peer) don't tickle the limiter. Tests that
# need to exercise the rate limit override this via a @TestProfile.
%test.fastbet.identity.signup.rate-limit.requests=1000
%test.fastbet.identity.signup.rate-limit.window-seconds=60

# In tests, provide a fixed non-blank edge token so the filter does not
# fail-fast on startup and tests can target the expected behavior.
%test.fastbet.identity.edge-token=test-edge-secret
